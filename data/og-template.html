<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; width: 1200px; height: 630px; background: #fdf6ec; font-family: 'Bricolage Grotesque', 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
  .wrap { padding: 70px 80px; position: relative; height: 490px; }
  .brand { font-size: 44px; font-weight: 800; letter-spacing: -0.03em; color: #2b2118; }
  .brand em { color: #e8613c; font-style: normal; }
  h1 { margin: 40px 0 0; font-size: 88px; font-weight: 800; letter-spacing: -0.035em; line-height: 1.02; color: #2b2118; }
  .mark { background: #c9e265; padding: 0 20px; border-radius: 18px; }
  .sub { margin-top: 28px; font-size: 30px; color: #6b5d4d; font-weight: 600; }
  .chips { position: absolute; bottom: 60px; left: 80px; display: flex; gap: 14px; }
  .chip { border: 3px solid #2b2118; border-radius: 99px; padding: 10px 24px; font-size: 24px; font-weight: 700; background: #fff; color: #2b2118; box-shadow: 4px 4px 0 #2b2118; }
  .c1 { background: #f9c5d8; transform: rotate(-2deg); }
  .c2 { background: #a8d8f0; transform: rotate(1.5deg); }
  .c3 { background: #f5d565; transform: rotate(-1deg); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">prompt<em>garden</em> 🌱</div>
    <h1>Pflanze dein<br><span class="mark">KI-Wissen</span> an.</h1>
    <p class="sub">Coden mit KI lernen — kostenlos · 5 Sprachen · alles mit Quellen</p>
    <div class="chips">
      <span class="chip c1">📖 Lexikon</span>
      <span class="chip c2">🎮 Lernpfade</span>
      <span class="chip c3">📰 Feed</span>
    </div>
  </div>
</body>
</html>
