name = "promptgarden-api"
main = "src/index.js"
compatibility_date = "2026-06-01"

# D1 anlegen (einmalig, sobald Token da):
#   npx wrangler d1 create promptgarden-db
# dann database_id unten eintragen und Schema laden:
#   npx wrangler d1 execute promptgarden-db --file=schema.sql --remote
[[d1_databases]]
binding = "DB"
database_name = "promptgarden-db"
database_id = "PLACEHOLDER_BIS_TOKEN_DA"

[vars]
# Erlaubte Origins, kommasepariert. Nach Deploy um pages.dev-URL / Domain ergänzen.
ALLOWED_ORIGINS = "http://localhost:4173,http://localhost:3000"

# Secret setzen (einmalig): npx wrangler secret put ADMIN_KEY
